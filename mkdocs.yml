site_name: ECOSALA — Coletivo de Formação e Ação em Agroecologia
site_description: Documentação do coletivo — atas, projetos, editais, fichas técnicas e membros
site_url: https://takwaratec.github.io/ECOSALA
repo_url: https://github.com/takwaratec/ECOSALA
repo_name: takwaratec/ECOSALA
edit_uri: edit/main/docs/
copyright: © ECOSALA, 2026. CC BY 4.0

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Início: index.md
  - 📋 ATA de Reuniões:
    - Memorial 05/05/2026: ata-05-05-2026.md
    - Reuniões e Transcrições: 12_REUNIOES/
  - 🚐 Projeto ECOSALA Itinerante: ecosala-itinerante.md
  - 📢 Editais:
    - Zayed Award 2027: editais/zayed-award-2027.md
    - Dossiê Zayed: editais/zayed-award-2027-dossie.md
    - FINEP Mais Inovação: editais/finep-mais-inovacao.md
  - 💰 BNDES Bioinsumos:
    - Formulário Espelho: 10_BNDES_BIOINSUMOS/BNDES_BIOINSUMOS_FORMULARIO_ESPELHO.md
    - Gabarito: 10_BNDES_BIOINSUMOS/GABARITO_BNDES_BIOINSUMOS_ECOSALA.md
    - Minuta Ajustes: 10_BNDES_BIOINSUMOS/MINUTA_AJUSTES_BNDES_BIOINSUMOS.md
  - 📚 Estudos Técnicos:
    - Biochar e Agricultura Familiar: 11_ESTUDOS_TECNICOS/Bioinsumos BNDES_ Biochar e Agricultura Familiar.md
    - Nota Técnica Biochar: 11_ESTUDOS_TECNICOS/NOTA_TECNICA_BIOCHAR_PIROLENHOSO_BAMBU.md
  - 👥 Membros:
    - 📎 Fichas de todos os membros no Acervo Científico: https://takwaratec.github.io/Analises-e-escrita-cientifica/analyses/ecosala/
  - 🔗 Acervo Científico: https://takwaratec.github.io/Analises-e-escrita-cientifica/
