site_name: ECOSALA — Coletivo de Formação e Ação em Agroecologia
site_description: Documentação do coletivo — atas, planos, editais e membros
site_url: https://takwaratec.github.io/ECOSALA
repo_url: https://github.com/takwaratec/ECOSALA
repo_name: takwaratec/ECOSALA
edit_uri: edit/main/docs/
copyright: © ECOSALA, 2026. CC BY 4.0

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Modo escuro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Início: index.md
  - 🌀 Plano Estratégico Multiprojetos: editais/plano-estrategico-multiprojetos-ecosala.md
  - 📋 ATA 07/07/2026: 12_REUNIOES/2026-07-07_REUNIAO_ALINHAMENTO_FINEP_ECOSALA.md
  - 🚐 Projeto ECOSALA Itinerante: ecosala-itinerante.md
  - 📢 Editais:
    - FINEP Mais Inovação: editais/finep-mais-inovacao.md
    - Zayed Award 2027: editais/zayed-award-2027.md
  - 👥 Membros: https://takwaratec.github.io/acervo-soberania-tecnologica/analyses/ecosala/
  - 🔗 Acervo Científico: https://takwaratec.github.io/acervo-soberania-tecnologica/
